server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Loopback (IPv4 e IPv6)
    allow 127.0.0.1;
    allow ::1;

    # Rede local — ajuste para sua faixa (descubra com: ipconfig)
    allow 192.168.1.0/24;
    allow 192.168.0.0/24;
    allow 10.0.0.0/24;

    # Docker bridge (gateway visto pelo nginx quando acesso vem do host)
    # Docker Desktop Windows (WSL2): 192.168.65.x
    # Docker bridge padrão: 172.16.0.0/12 cobre 172.16–172.31
    allow 172.16.0.0/12;
    allow 192.168.65.0/24;

    deny all;

    # Autenticação básica
    auth_basic "Dashboard TV";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Cache
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header Pragma no-cache;
    add_header Expires 0;

    # Segurança
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer";
    add_header Content-Security-Policy "default-src 'self'; frame-src *; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';";
}
